{{- if .Values.rbac.create }}
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "mqtt-device-manager.fullname" . }}-leader-election-rolebinding
  labels:
    {{- include "mqtt-device-manager.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "mqtt-device-manager.fullname" . }}-leader-election-role
subjects:
- kind: ServiceAccount
  name: {{ include "mqtt-device-manager.serviceAccountName" . }}
  namespace: {{ .Release.Namespace }}
{{- end }}
