{{- if .Values.rbac.create }}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "mqtt-device-manager.fullname" . }}-manager-role
  labels:
    {{- include "mqtt-device-manager.labels" . | nindent 4 }}
rules:
- apiGroups:
  - database.hauke.cloud
  resources:
  - databases
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - database.hauke.cloud
  resources:
  - databases/finalizers
  verbs:
  - update
- apiGroups:
  - database.hauke.cloud
  resources:
  - databases/status
  verbs:
  - get
  - patch
  - update
- apiGroups:
  - ""
  resources:
  - secrets
  verbs:
  - get
  - list
  - watch
{{- with .Values.rbac.rules }}
{{- toYaml . | nindent 0 }}
{{- end }}
{{- end }}
